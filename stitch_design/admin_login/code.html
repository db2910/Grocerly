<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

                "background-dark": "#122018",

              borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},

<title>Grocerly Admin Login</title>
</head>
<body class="font-display bg-[#FAF9F6] dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[440px] flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-8 flex flex-col items-center gap-2">
<div class="bg-primary p-3 rounded-xl shadow-lg shadow-primary/20">
<svg class="size-8 text-white" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">

</div>
<h1 class="text-slate-900 dark:text-slate-100 text-2xl font-bold tracking-tight">Grocerly Admin</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Sign in to manage your grocery ecosystem</p>
</div>
<!-- Card Section -->
<div class="w-full bg-white dark:bg-background-dark/50 p-8 rounded-xl shadow-xl shadow-slate-200/50 dark:shadow-none border border-slate-100 dark:border-primary/20">
<form action="#" class="space-y-6" method="POST">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-primary text-lg">mail</span>
                        Email Address
                    </label>
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-primary/30 bg-white dark:bg-background-dark text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" id="email" name="email" placeholder="admin@grocerly.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-primary text-lg">lock</span>
                            Password
                        </label>
<a class="text-primary hover:text-primary/80 text-xs font-medium transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<input class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-primary/30 bg-white dark:bg-background-dark text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all placeholder:text-slate-400" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary border-slate-300 rounded focus:ring-primary cursor-pointer" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-slate-600 dark:text-slate-400 cursor-pointer" for="remember">Remember this device</label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2 group" type="submit">
                    Sign In to Dashboard
                    <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Bottom Note -->
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-primary/10 text-center">
<p class="text-slate-500 dark:text-slate-400 text-xs leading-relaxed">
                    By logging in, you agree to Grocerly's <a class="text-primary hover:underline" href="#">Terms of Service</a> and <a class="text-primary hover:underline" href="#">Security Protocols</a>.
                </p>
</div>
</div>
<!-- Quick Help Section -->
<div class="mt-8 flex justify-center gap-6">
<a class="flex items-center gap-2 text-slate-500 hover:text-primary text-sm transition-colors group" href="#">
<span class="material-symbols-outlined text-lg">help</span>
<span>Support Center</span>
</a>
<div class="w-px h-4 bg-slate-300 dark:bg-primary/20 self-center"></div>
<a class="flex items-center gap-2 text-slate-500 hover:text-primary text-sm transition-colors" href="#">
<span class="material-symbols-outlined text-lg">shield</span>
<span>Security Tips</span>
</a>
</div>
</div>
</body></html>
